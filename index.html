<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIFA Analytics — Etapa 5</title>
<meta name="description" content="Panel analítico del proyecto FIFA Players 2015–2024: reporte de todas las preguntas y 3 dashboards interactivos." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="gui/styles.css" />
</head>
<body>
<div class="app" id="app">
  <div class="backdrop" id="backdrop"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand-block">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 5-7"/></svg>
      </span>
      <div>
        <div class="brand-title">FIFA Analytics</div>
        <div class="brand-sub">Etapa 5 · De datos a Información</div>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="Secciones"></nav>
    <div class="sidebar-foot">Dataset FIFA Players · 2015–2024 · 214.804 registros</div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="icon-btn hamburger" id="menuBtn" aria-label="Abrir menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div>
        <div class="crumb" id="crumb">Resumen</div>
        <h1 id="viewTitle">Resumen del proyecto</h1>
      </div>
      <div class="spacer"></div>
      <span class="season-pill" id="seasonPill">Temporada 2015-2024</span>
      <button class="icon-btn" id="themeBtn" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </header>

    <main class="content" id="content">
      <!-- views injected by app.js -->
    </main>
  </div>
</div>

<!-- 1) vendor  2) datos  3) infraestructura GUI  4) una etapa por archivo  5) core (init) -->
<script src="vendor/chart.umd.min.js"></script>
<script src="dataset/data.js"></script>
<script src="gui/charts.js"></script>
<script src="gui/ui.js"></script>
<script src="etapas/resumen.js"></script>
<script src="etapas/etapa1.js"></script>
<script src="etapas/etapa2.js"></script>
<script src="etapas/etapa3.js"></script>
<script src="etapas/etapa4.js"></script>
<script src="gui/core.js"></script>
</body>
</html>
